services:
  - type: web
    name: setmind
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm --prefix web install && npm run build
    startCommand: npm run server
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-lite
